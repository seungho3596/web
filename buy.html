
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script language="javascript" src="jquery-3.5.1.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="buy.css">
    <title></title>
  </head>
  <body>
    <div id="content">
      <div class="img">
        <div id="bigImage">
          <img id=big src="https://gdimg.gmarket.co.kr/1277471036/still/600?ver=1519613052">
        </div>
        <div id="smallImage">
          <img class="small" src="https://gdimg.gmarket.co.kr/1277471036/still/600?ver=1519613052">
          <img class="small" src="https://image.auction.co.kr/itemimage/12/b4/92/12b492a086.jpg">
        </div>
      </div>
      <div class="detail">
        <h2>네온컬러 루즈핏 티셔츠 1+1</h2>
        <form id="form1" name="form1" method="post" action="">
          <table>
            <tr>
            <td>판매가</td>
            <td>9800원</td>
            </tr>
            <tr>
            <td>사이즈</td>
            <td>
          <select name="option1" id="option1" class="opt">
            <option value="">사이즈 선택</option>
            <option value="이름1|옵션1|1000">M</option>
            <option value="이름2|옵션2|5000">L</option>
            <option value="이름3|옵션3|6000">XL</option>
          </select>
         </td>
          </tr>
          <tr>
            <td>색상선택</td>
            <td>
          <select name="option2" id="option2" class="opt">
            <option value="">색깔</option>
            <option value="이름4|옵션1|0">Black</option>
            <option value="이름5|옵션2|0">Red</option>
            <option value="이름6|옵션3|0">Blue</option>
          </select>
        </td>
        </tr>
        <tr>
          <td>배송지역 선택</td>
          <td>
          <select name="option3" id="option3" class="opt">
            <option value="">배송비</option>
            <option value="이름7|옵션1|1000">경기도</option>
            <option value="이름8|옵션2|0">충남</option>
            <option value="이름9|옵션3|2000">충북</option>
          </select>
        </td>
        </tr>
          </table>
          <p>
            <label>합 계:
            <input type="text" name="totalPrice" id="totalPrice" />
            </label>
          </p>
        </form>
        <script type="text/javascript">
        $(function(){
          $("select.opt").change(function(){
              $temp = 0;
              $originPrice = 9800;
              $.each($("form#form1 :selected"), function(){
                var str = $(this).val();
                if (!str) {
                    var eachPrice = 0;
                    $temp = $temp+eachPrice;
                    } else {
                    var eachPrice = str.split("|");
                        eachPrice = parseInt(eachPrice[2]);
        $temp = $temp + eachPrice;
                    }
              });
              $totalPrice = $temp+$originPrice;
              $("input#totalPrice").val($totalPrice);
          });
        });
        </script>
      </div>
    </div>
    <script src="buy.js"></script>
  </body>
</html>
